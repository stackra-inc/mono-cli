<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="30%" stop-color="#818cf8"/>
      <stop offset="60%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Ambient glow circles -->
  <circle cx="200" cy="200" r="200" fill="#818cf8" opacity="0.03"/>
  <circle cx="900" cy="100" r="180" fill="#e94560" opacity="0.03"/>
  <circle cx="600" cy="350" r="150" fill="#22c55e" opacity="0.02"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Hexagon icon (⬡) -->
  <g transform="translate(100, 130)" filter="url(#glow)">
    <polygon points="60,10 110,35 110,85 60,110 10,85 10,35" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" opacity="0.9"/>
    <text x="60" y="75" font-family="ui-monospace,'Cascadia Code',Menlo,monospace" font-size="40" font-weight="700" fill="url(#iconGrad)" text-anchor="middle">⬡</text>
  </g>

  <!-- Package name -->
  <text x="240" y="175" font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="42" font-weight="700" fill="url(#textGrad)" letter-spacing="-0.5">@stackra/mono-cli</text>

  <!-- Description -->
  <text x="240" y="215" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="17" fill="#64748b">Universal CLI for managing Stackra monorepos across all ecosystems</text>

  <!-- Feature badges -->
  <g transform="translate(240, 240)">
    <!-- Node -->
    <rect x="0" y="0" width="72" height="30" rx="6" fill="#22c55e" opacity="0.12"/>
    <rect x="0" y="0" width="72" height="30" rx="6" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <text x="36" y="20" font-family="ui-monospace,monospace" font-size="12" fill="#22c55e" text-anchor="middle">🟢 Node</text>

    <!-- PHP -->
    <rect x="86" y="0" width="68" height="30" rx="6" fill="#777bb4" opacity="0.12"/>
    <rect x="86" y="0" width="68" height="30" rx="6" fill="none" stroke="#777bb4" stroke-width="1" opacity="0.3"/>
    <text x="120" y="20" font-family="ui-monospace,monospace" font-size="12" fill="#777bb4" text-anchor="middle">🐘 PHP</text>

    <!-- React Native -->
    <rect x="168" y="0" width="120" height="30" rx="6" fill="#61dafb" opacity="0.12"/>
    <rect x="168" y="0" width="120" height="30" rx="6" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
    <text x="228" y="20" font-family="ui-monospace,monospace" font-size="12" fill="#61dafb" text-anchor="middle">📱 React Native</text>

    <!-- Go -->
    <rect x="302" y="0" width="58" height="30" rx="6" fill="#00add8" opacity="0.12"/>
    <rect x="302" y="0" width="58" height="30" rx="6" fill="none" stroke="#00add8" stroke-width="1" opacity="0.3"/>
    <text x="331" y="20" font-family="ui-monospace,monospace" font-size="12" fill="#00add8" text-anchor="middle">🔵 Go</text>

    <!-- Python -->
    <rect x="374" y="0" width="82" height="30" rx="6" fill="#3776ab" opacity="0.12"/>
    <rect x="374" y="0" width="82" height="30" rx="6" fill="none" stroke="#3776ab" stroke-width="1" opacity="0.3"/>
    <text x="415" y="20" font-family="ui-monospace,monospace" font-size="12" fill="#3776ab" text-anchor="middle">🐍 Python</text>
  </g>

  <!-- Terminal preview -->
  <g transform="translate(750, 105)" opacity="0.5">
    <text font-family="ui-monospace,'Cascadia Code','Fira Code',Menlo,monospace" font-size="13">
      <tspan x="0" dy="0" fill="#64748b">$</tspan><tspan fill="#94a3b8"> mono status</tspan>
      <tspan x="0" dy="22" fill="#22c55e">✔</tspan><tspan fill="#94a3b8"> frontend-monorepo</tspan><tspan fill="#64748b">  [node]</tspan>
      <tspan x="0" dy="20" fill="#22c55e">✔</tspan><tspan fill="#94a3b8"> php-monorepo</tspan><tspan fill="#64748b">       [node] [php]</tspan>
      <tspan x="0" dy="20" fill="#22c55e">✔</tspan><tspan fill="#94a3b8"> react-native-mono</tspan><tspan fill="#64748b">  [node] [rn]</tspan>
      <tspan x="0" dy="30" fill="#64748b">$</tspan><tspan fill="#94a3b8"> mono clean all</tspan>
      <tspan x="0" dy="20" fill="#818cf8">🧹</tspan><tspan fill="#94a3b8"> Detected: node php react-native</tspan>
      <tspan x="0" dy="20" fill="#22c55e">✔</tspan><tspan fill="#94a3b8"> All clean</tspan><tspan fill="#64748b"> (1.2s)</tspan>
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="397" width="1200" height="3" fill="url(#accent)"/>

  <!-- Version badge -->
  <g transform="translate(1080, 360)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#818cf8" opacity="0.1"/>
    <text x="40" y="16" font-family="ui-monospace,monospace" font-size="12" fill="#818cf8" text-anchor="middle">v1.0.0</text>
  </g>

  <!-- Stackra footer -->
  <text x="40" y="380" font-family="-apple-system,sans-serif" font-size="11" fill="#334155">Stackra L.L.C</text>
</svg>
